<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تم تأكيد الطلب - قرنفل</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="confirmation-page">
    <div class="confirmation-card">
      <div class="confirmation-icon">✅</div>
      <h1>تم استلام طلبك! 🎉</h1>
      <p class="confirmation-sub">شكراً لتسوقك من قرنفل. سنتواصل معك قريباً لتأكيد الطلب.</p>

      <div class="confirmation-details" id="orderDetails">
        <div class="conf-detail-row">
          <span class="conf-label">رقم الطلب</span>
          <span class="conf-value" id="orderId">—</span>
        </div>
        <div class="conf-detail-row">
          <span class="conf-label">الاسم</span>
          <span class="conf-value" id="orderName">—</span>
        </div>
        <div class="conf-detail-row">
          <span class="conf-label">رقم الهاتف</span>
          <span class="conf-value" id="orderPhone">—</span>
        </div>
        <div class="conf-detail-row">
          <span class="conf-label">العنوان</span>
          <span class="conf-value" id="orderAddress">—</span>
        </div>
        <div class="conf-detail-row">
          <span class="conf-label">تاريخ الطلب</span>
          <span class="conf-value" id="orderDate">—</span>
        </div>
      </div>

      <div class="confirmation-items" id="orderItems">
        <h3>المنتجات</h3>
      </div>

      <div class="confirmation-total" id="orderTotal">0 JOD</div>

      <div class="confirmation-actions">
        <a href="/" class="btn-primary"><i class="fas fa-arrow-right"></i> العودة للمتجر</a>
        <a href="https://wa.me/962792067277" target="_blank" class="btn-outline"><i class="fab fa-whatsapp"></i> تواصل معنا</a>
      </div>
      <div style="margin-top:16px;text-align:center">
        <button onclick="resendWhatsApp()" class="btn-primary" style="background:#25D366;border-color:#25D366;font-size:14px;padding:12px 24px"><i class="fab fa-whatsapp"></i> إرسال الطلب عبر واتساب</button>
        <p style="color:var(--text-light);font-size:12px;margin-top:8px">تأكد من إرسال الطلب للواتساب حتى يتم معالجته</p>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const data = sessionStorage.getItem('lastOrder');
      let order = null;

      if (data) {
        try { order = JSON.parse(data); } catch {}
      }

      const params = new URLSearchParams(window.location.search);
      const orderId = params.get('id');

      if (order && (!orderId || String(order.id) === orderId)) {
        document.getElementById('orderId').textContent = '#' + order.id;
        document.getElementById('orderName').textContent = order.name;
        document.getElementById('orderPhone').textContent = order.phone;
        document.getElementById('orderAddress').textContent = order.address;
        document.getElementById('orderDate').textContent = new Date(order.createdAt).toLocaleDateString('ar') + ' ' + new Date(order.createdAt).toLocaleTimeString('ar');
        document.getElementById('orderItems').innerHTML = '<h3>المنتجات</h3>' +
          order.items.map(i => `<div class="conf-item"><span>${i.title}</span><span>×${i.quantity} = ${(i.price * i.quantity).toFixed(2)} JOD</span></div>`).join('');
        document.getElementById('orderTotal').textContent = order.total + ' JOD';

        window._lastOrder = order;
      } else {
        document.querySelector('.confirmation-details').style.display = 'none';
        document.getElementById('orderItems').style.display = 'none';
        document.getElementById('orderTotal').style.display = 'none';
        document.querySelector('.confirmation-actions + div').style.display = 'none';
      }
    })();

    function resendWhatsApp() {
      const order = window._lastOrder;
      if (!order) return;
      const date = new Date(order.createdAt).toLocaleString('ar', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      const items = (order.items || []).map(i =>
        `🛒 ${i.title}\n   ${i.quantity} × ${i.price.toFixed(2)} JOD = ${(i.price * i.quantity).toFixed(2)} JOD`
      ).join('\n');
      let msg = `🌿 *قرنفل — طلب جديد* 🌿\n`;
      msg += `━━━━━━━━━━━━━━━━\n`;
      msg += `🆔 *رقم الطلب:* #${order.id}\n`;
      msg += `📅 *التاريخ:* ${date}\n`;
      msg += `━━━━━━━━━━━━━━━━\n`;
      msg += `👤 *العميل:* ${order.name}\n`;
      msg += `📞 *الهاتف:* ${order.phone}\n`;
      msg += `📍 *العنوان:* ${order.address}\n`;
      if (order.notes) msg += `📝 *ملاحظات:* ${order.notes}\n`;
      msg += `━━━━━━━━━━━━━━━━\n`;
      msg += `*المنتجات:*\n${items}\n`;
      msg += `━━━━━━━━━━━━━━━━\n`;
      msg += `💵 *الإجمالي:* ${order.total} JOD\n`;
      msg += `━━━━━━━━━━━━━━━━\n`;
      msg += `🌐 قرنفل — متجر التراث الفلسطيني`;
      window.open('https://wa.me/962792067277?text=' + encodeURIComponent(msg), '_blank');
    }
  </script>
</body>
</html>
