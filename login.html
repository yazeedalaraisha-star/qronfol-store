<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - قرنفل</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--bg-light), var(--cream)); padding: 20px; }
    .login-card { background: white; border-radius: var(--radius); padding: 40px 32px; width: 100%; max-width: 400px; box-shadow: var(--shadow-hover); text-align: center; }
    .login-card .logo { margin-bottom: 32px; }
    .login-card .logo h1 { font-size: 32px; }
    .login-card h2 { font-family: var(--font-heading); font-size: 20px; font-weight: 700; color: var(--text-dark); margin-bottom: 8px; }
    .login-card p { color: var(--text-light); font-size: 14px; margin-bottom: 24px; }
    .login-error { background: #fee2e2; color: var(--palestine-red); padding: 10px 16px; border-radius: var(--radius-sm); font-size: 14px; margin-bottom: 16px; display: none; }
    .login-card .form-group { margin-bottom: 16px; text-align: right; }
    .login-card .form-group label { display: block; font-size: 14px; font-weight: 600; color: var(--text-mid); margin-bottom: 4px; }
    .login-card .form-group input { width: 100%; padding: 12px 16px; border: 1.5px solid rgba(0,0,0,0.1); border-radius: var(--radius-sm); font-family: inherit; font-size: 15px; transition: var(--transition); background: var(--bg-light); }
    .login-card .form-group input:focus { outline: none; border-color: var(--green-mid); box-shadow: 0 0 0 3px rgba(45,106,79,0.1); }
    .login-card .btn-primary { width: 100%; justify-content: center; padding: 14px; font-size: 16px; }
    .login-footer { margin-top: 20px; font-size: 13px; color: var(--text-light); }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="logo">
        <a href="/"><h1>قرنفل</h1><span class="logo-sub">Qronfol Admin</span></a>
      </div>
      <h2>تسجيل الدخول</h2>
      <p>لوحة التحكم — متجر التراث الفلسطيني</p>
      <div class="login-error" id="loginError"></div>
      <form id="loginForm" action="/api/login-form" method="POST">
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" name="password" required placeholder="أدخل كلمة المرور" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary">
          <i class="fas fa-lock"></i> تسجيل الدخول
        </button>
      </form>
      <div class="login-footer">
        <a href="/" style="color:var(--green-mid);text-decoration:underline"><i class="fas fa-arrow-right"></i> العودة للمتجر</a>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      if (params.get('error') === '1') {
        document.getElementById('loginError').textContent = 'كلمة المرور غير صحيحة';
        document.getElementById('loginError').style.display = 'block';
      } else if (params.get('error') === '2') {
        document.getElementById('loginError').textContent = 'محاولات كثيرة، حاول بعد 15 دقيقة';
        document.getElementById('loginError').style.display = 'block';
      }
    })();
  </script>
</body>
</html>
